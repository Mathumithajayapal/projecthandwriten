<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>404 | Page Not Found – InkWhisper</title>

  <!-- Tailwind -->
  <script src="tailwind.js"></script>

  <!-- Google Fonts: Inter + Playfair Display (matching InkWhisper brand style) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Font Awesome for optional icons (keeping brand consistency) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="icon" type="image/jpeg" href="images/writen1 (1).jpg">


  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: "#4A2E1F",
            accent: "#BF7F3A",
            soft: "#FEF8F0",
            light: "#FFE8D4"
          },
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'sans-serif'],
            'serif': ['Playfair Display', 'serif']
          }
        }
      }
    }
  </script>

  <style>
    /* Dark mode support - matching InkWhisper about page */
    html.dark body {
      background-color: #1a1410 !important;
    }
    
    /* Smooth transitions */
    * {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    
    /* Button hover effects */
    .btn-home {
      transition: all 0.2s ease;
    }
    .btn-home:hover {
      transform: translateY(-2px);
    }
    .btn-contact:hover {
      transform: translateY(-2px);
    }
    
    /* Responsive adjustments */
    @media (max-width: 640px) {
      h1 {
        font-size: 5rem !important;
      }
      h2 {
        font-size: 1.75rem !important;
      }
      .btn-home, .btn-contact {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
        font-size: 0.9rem;
      }
    }
    
    @media (max-width: 480px) {
      h1 {
        font-size: 4rem !important;
      }
      h2 {
        font-size: 1.5rem !important;
      }
      .flex {
        gap: 0.75rem;
      }
    }
  </style>
</head>

<body class="bg-[#FEF8F0] font-sans dark:bg-[#1a1410] transition min-h-screen flex flex-col items-center justify-center text-center px-6">

  <!-- Main Content -->
  <div class="max-w-lg mx-auto">
    
    <!-- 404 Number - Playfair Display for elegant serif style -->
    <h1 class="text-7xl md:text-8xl lg:text-9xl font-bold text-[#4A2E1F] dark:text-[#FEF8F0] tracking-tight" 
        style="font-family: 'Playfair Display', serif; font-weight: 800;">
      404
    </h1>

    <!-- Message Heading -->
    <h2 class="mt-4 text-2xl md:text-3xl font-semibold text-[#4A2E1F] dark:text-[#FEF8F0]"
        style="font-family: 'Playfair Display', serif;">
      Page Not Found
    </h2>

    <!-- Description Text - Using Inter (brand sans font) -->
    <p class="mt-3 text-[#6F523B] dark:text-[#C9BDA8] max-w-md mx-auto leading-relaxed text-base md:text-lg"
       style="font-family: 'Inter', system-ui, sans-serif;">
      The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>

    <!-- Action Buttons -->
    <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center items-center">
      <a href="index.html"
        class="btn-home px-6 py-2.5 md:px-8 md:py-3 bg-[#4A2E1F] hover:bg-[#6B422A] dark:bg-[#5a3a28] dark:hover:bg-[#7a4f38] text-white font-semibold rounded-full transition shadow-md inline-flex items-center gap-2 text-sm md:text-base"
        style="font-family: 'Inter', system-ui, sans-serif;">
        <i class="fas fa-home text-sm"></i> Go Home
      </a>

      <a href="contact.html"
        class="btn-contact px-6 py-2.5 md:px-8 md:py-3 border border-[#FFE0B5] dark:border-[#5a4a38] rounded-full hover:bg-[#FFE8D4] dark:hover:bg-[#3d3228] transition text-[#4A2E1F] dark:text-[#FEF8F0] font-medium inline-flex items-center gap-2 text-sm md:text-base"
        style="font-family: 'Inter', system-ui, sans-serif;">
        <i class="fas fa-envelope text-sm"></i> Contact Support
      </a>
    </div>
    
    <!-- Optional decorative element - brand touch -->
    <a href="index.html" class="mt-8 text-center text-xs text-[#8B694A] dark:text-[#C9BDA8] block hover:text-[#BF7F3A] transition">
      <i class="fas fa-feather-alt text-[#BF7F3A] text-xs mr-1"></i> InkWhisper — botanical essence
    </a>
  </div>

  <!-- Simple script to sync dark mode with localStorage if needed (consistent with other pages) -->
  <script>
    (function() {
      const html = document.documentElement;
      // Check for saved dark mode preference (matching InkWhisper brand)
      if (localStorage.getItem('inkwhisper_dark') === 'enabled') {
        html.classList.add('dark');
      } else if (localStorage.getItem('inkwhisper_dark') === 'disabled') {
        html.classList.remove('dark');
      } else {
        // Default to light mode if no preference
        html.classList.remove('dark');
      }
    })();
  </script>
</body>
</html>
